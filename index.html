<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Salma 🎉</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('salma.jpg') no-repeat center center/cover;
      filter: brightness(0.5);
      z-index: -2;
    }

    .container { z-index: 2; padding: 20px; }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 25px gold, 0 0 35px orange; }
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      background: linear-gradient(45deg, gold, orange);
      color: black;
      cursor: pointer;
    }

    /* Slideshow */
    .slideshow {
      position: absolute;
      bottom: 20px;
      width: 90%;
      max-width: 350px;
      height: 220px;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.8s ease-in-out;
    }

    .slide {
      position: relative;
      min-width: 100%;
      height: 100%;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .caption {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(100vh) rotate(360deg); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .slideshow { height: 222px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Happy Birthday Salma 💎🔥</h1>
    <button onclick="startMusic()">🎵 Start Music</button>
  </div>

  <!-- Slideshow with messages -->
  <div class="slideshow">
    <div class="slides" id="slides">

      <div class="slide">
        <img src="salma1.jpg">
        <div class="caption">You make every moment brighter 💖</div>
      </div>

      <div class="slide">
        <img src="salma2.jpg">
        <div class="caption">Your smile is my favorite thing 😊</div>
      </div>

      <div class="slide">
        <img src="salma3.jpg">
        <div class="caption">Forever grateful to have you 🌹</div>
      </div>

    </div>
  </div>

  <!-- Audio Player -->
  <audio id="music"></audio>

  <script>
    const playlist = [
      "salmasong.mp3",
      "https://www.bensound.com/bensound-music/bensound-sunny.mp3",
      "https://www.bensound.com/bensound-music/bensound-love.mp3"
    ];

    let currentTrack = 0;
    const audio = document.getElementById('music');

    function startMusic() {
      audio.src = playlist[currentTrack];
      audio.play();
    }

    audio.addEventListener('ended', () => {
      currentTrack = (currentTrack + 1) % playlist.length;
      audio.src = playlist[currentTrack];
      audio.play();
    });

    function createConfetti() {
      const colors = ['red','yellow','blue','green','pink','orange'];
      for (let i = 0; i < 100; i++) {
        let confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(confetti);
      }
    }
    createConfetti();

    let index = 0;
    const slides = document.getElementById('slides');
    const totalSlides = slides.children.length;

    function showSlide() {
      index = (index + 1) % totalSlides;
      slides.style.transform = `translateX(-${index * 100}%)`;
    }

    setInterval(showSlide, 3000);
  </script>

</body>
</html>
